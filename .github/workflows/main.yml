name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint PHP entry files
        run: |
          php -l index.php
          php -l includes/site.php
          php -l services.php
          php -l clients.php
          php -l service-areas.php
          php -l why-manhattan-appliance.php
          php -l resources.php
          php -l contact.php
          php -l brands-we-service.php
          php -l faqs.php
          php -l lead-request.php
          php -l appliance-repair-manhattan.php
          php -l appliance-repair-new-jersey.php
          php -l sub-zero-repair-nyc.php
          php -l miele-repair-nyc.php
          php -l viking-repair-nyc.php

      - name: Refresh static homepage fallback
        run: php index.php > index.html

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Check FTP secrets
        run: |
          test -n "${{ secrets.FTP_HOST }}" || (echo "::error::Missing FTP_HOST secret" && exit 1)
          test -n "${{ secrets.FTP_USERNAME }}" || (echo "::error::Missing FTP_USERNAME secret" && exit 1)
          test -n "${{ secrets.FTP_PASSWORD }}" || (echo "::error::Missing FTP_PASSWORD secret" && exit 1)

      - name: Deploy files to IONOS via FTPS
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: /
          FTP_PORT: 21
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF
          set ssl:verify-certificate no
          set ftp:ssl-allow true
          set ftp:ssl-force true
          set ftp:passive-mode true
          set net:max-retries 2
          set net:timeout 20
          lcd $GITHUB_WORKSPACE
          cd $FTP_REMOTE_DIR
          mirror -R --delete --verbose \
            --exclude-glob .DS_Store \
            --exclude-glob .git \
            --exclude-glob .gitignore \
            --exclude-glob .github \
            --exclude-glob node_modules \
            --exclude-glob dist \
            --exclude-glob .opcache \
            --exclude-glob clickandbuilds \
            --exclude-glob manhattanappliances \
            --exclude-glob logs \
            --exclude-glob *.md \
            --exclude-glob .*.md \
            ./ .
          bye
          EOF

      - name: Verify homepage responds
        run: |
          curl -fsSL https://manhattanappliancellc.com/ > /tmp/root.html
          test -s /tmp/root.html
