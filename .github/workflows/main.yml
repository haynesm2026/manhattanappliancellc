name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.FTP_PASSWORD }}
          SSH_PASS: ${{ secrets.FTP_PASSWORD }}
          SSH_HOST: ${{ secrets.FTP_HOST }}
          SSH_PORT: ${{ secrets.FTP_PORT }}
        run: |
          test -n "$SSH_PRIVATE_KEY" || (echo "::error::Missing SSH_PRIVATE_KEY secret" && exit 1)
          test -n "$SSH_HOST" || (echo "::error::Missing SSH_HOST secret" && exit 1)
          test -n "$SSH_PORT" || (echo "::error::Missing SSH_PORT secret" && exit 1)

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

          if ssh-keygen -y -P "" -f ~/.ssh/id_rsa >/dev/null 2>&1; then
            ssh-add ~/.ssh/id_rsa
          else
            if [ -z "${SSH_PASS:-}" ]; then
              echo "::error::SSH_PASS secret is empty, but the SSH private key appears to be passphrase-protected."
              exit 1
            fi

            printf '%s\n' '#!/usr/bin/env sh' 'echo "$SSH_PASS"' > ~/.ssh/askpass.sh
            chmod 700 ~/.ssh/askpass.sh

            export SSH_ASKPASS=~/.ssh/askpass.sh
            export SSH_ASKPASS_REQUIRE=force
            export DISPLAY=:0
            setsid -w ssh-add ~/.ssh/id_rsa </dev/null
          fi

      - name: Test SSH authentication
        run: |
          ssh-add -l
          ssh -p ${{ secrets.FTP_PORT }} \
            -o BatchMode=yes \
            ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }} "echo 'SSH OK'"

      - name: Lint PHP entry files
        run: |
          php -l index.php
          php -l includes/site.php
          php -l services.php
          php -l clients.php
          php -l service-areas.php
          php -l why-manhattan-appliance.php
          php -l resources.php
          php -l contact.php
          php -l brands-we-service.php
          php -l faqs.php
          php -l lead-request.php
          php -l appliance-repair-manhattan.php
          php -l appliance-repair-new-jersey.php
          php -l sub-zero-repair-nyc.php
          php -l miele-repair-nyc.php
          php -l viking-repair-nyc.php

      - name: Refresh static homepage fallback
        run: php index.php > index.html

      - name: Check deploy secrets
        run: |
          test -n "${{ secrets.FTP_USERNAME }}" || (echo "::error::Missing FTP_USERNAME secret" && exit 1)
          test -n "${{ secrets.FTP_REMOTE_DIR }}" || (echo "::error::Missing FTP_REMOTE_DIR secret" && exit 1)

      - name: Deploy files using rsync over SSH
        run: |
          rsync -e "ssh -p ${{ secrets.FTP_PORT }}" -avz --delete --delete-excluded \
          --exclude='.DS_Store' \
          --exclude='.git/' \
          --exclude='.gitignore' \
          --exclude='.github/' \
          --exclude='node_modules/' \
          --exclude='dist/' \
          --exclude='.opcache/' \
          --exclude='clickandbuilds/' \
          --exclude='manhattanappliances/' \
          --exclude='logs/' \
          --exclude='*.md' \
          --exclude='.*.md' \
          ./ ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}:${{ secrets.FTP_REMOTE_DIR }}

      - name: Verify homepage responds
        run: |
          curl -fsSL https://manhattanappliancellc.com/ > /tmp/root.html
          test -s /tmp/root.html
