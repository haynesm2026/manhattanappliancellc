name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Install sshpass to allow password-based rsync
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # 2. Add IONOS to known_hosts to prevent the "Are you sure you want to continue connecting?" prompt
      - name: Add IONOS to known_hosts
        env:
          SSH_PORT: ${{ secrets.FTP_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$SSH_PORT" ${{ secrets.FTP_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Lint PHP entry files
        run: |
          for file in index.php includes/site.php services.php clients.php service-areas.php why-manhattan-appliance.php resources.php contact.php brands-we-service.php faqs.php lead-request.php appliance-repair-manhattan.php appliance-repair-new-jersey.php sub-zero-repair-nyc.php miele-repair-nyc.php viking-repair-nyc.php; do
            php -l "$file"
          done

      - name: Refresh static homepage fallback
        run: php index.php > index.html

      # 3. Deploy using rsync + sshpass
      - name: Test SSH login
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
          SSH_PORT: ${{ secrets.FTP_PORT || '22' }}
        run: |
          sshpass -e ssh -p "$SSH_PORT" \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }} "echo 'SSH OK'"

      - name: Deploy files using rsync over SSH
        env:
          # Passes the password securely to sshpass without exposing it in the command logs
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
          SSH_PORT: ${{ secrets.FTP_PORT || '22' }}
        run: |
          sshpass -e rsync -e "ssh -p $SSH_PORT -o PreferredAuthentications=password -o PubkeyAuthentication=no -o StrictHostKeyChecking=yes" -rvz --delete --delete-excluded --omit-dir-times --no-times --no-perms --no-owner --no-group \
          --exclude='.DS_Store' \
          --exclude='.git/' \
          --exclude='.gitignore' \
          --exclude='.github/' \
          --exclude='node_modules/' \
          --exclude='dist/' \
          --exclude='.opcache/' \
          --exclude='clickandbuilds/' \
          --exclude='manhattanappliances/' \
          --exclude='logs/' \
          --exclude='*.md' \
          --exclude='.*.md' \
          ./ ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}:${{ secrets.FTP_REMOTE_DIR }}

      - name: Verify homepage responds
        run: |
          curl -fsSL https://manhattanappliancellc.com/ > /tmp/root.html
          test -s /tmp/root.html
